<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learnify | AI Academic Lesson Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
            },
            colors: {
              navy: {
                50: '#f0f4f8',
                100: '#d9e2ec',
                800: '#1e293b',
                900: '#0f172a',
              },
              gold: {
                50: '#fffbf0',
                100: '#fef3c7',
                500: '#d97706',
                600: '#b45309',
                700: '#92400e',
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Premium Background Texture */
      body {
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Custom scrollbar for academic feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      /* Print Styles (Fallback) */
      @media print {
        @page {
          margin: 10mm;
          size: auto;
        }
        body {
          background-color: white !important;
          background-image: none !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        header, footer, .no-print { 
          display: none !important; 
        }
        .print-content { 
          width: 100% !important;
          padding: 0 !important;
          margin: 0 !important;
          max-width: 100% !important;
          box-shadow: none !important;
          border: none !important;
        }
        .print-break-inside-avoid {
          break-inside: avoid;
        }
      }

      /* PDF Export Specific Styles (used by html2pdf) */
      .pdf-exporting {
        width: 1100px !important; /* Force a fixed desktop-like width */
        margin: 0 auto;
        background-color: white;
        padding: 20px;
      }
      .pdf-exporting .no-print {
        display: none !important;
      }
      .pdf-exporting .chat-widget-root {
        height: auto !important;
        border: 1px solid #e2e8f0;
      }
      .pdf-exporting .chat-messages-area {
        height: auto !important;
        overflow: visible !important;
        max-height: none !important;
      }
      /* Force grid layout in PDF export */
      .pdf-exporting .lg\:grid-cols-12 {
        display: grid !important;
        grid-template-columns: repeat(12, minmax(0, 1fr)) !important;
      }
      .pdf-exporting .lg\:col-span-4 {
        grid-column: span 4 / span 4 !important;
      }
      .pdf-exporting .lg\:col-span-8 {
        grid-column: span 8 / span 8 !important;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
  <body class="text-slate-800 antialiased selection:bg-gold-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
