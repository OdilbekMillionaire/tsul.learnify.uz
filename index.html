    <script>

    <style>
      /* Dark Mode Variables */
      :root {
        color-scheme: light;
      }

      html[data-theme="dark"],
      html.dark {
        color-scheme: dark;
      }

      html.dark {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --border: #334155;
      }

      /* Premium Background Texture */
      body {
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
        transition: background-color 0.3s, color 0.3s;
      }

      html.dark body {
        background-color: #0f172a;
        background-image: radial-gradient(#1e293b 1px, transparent 1px);
      }

      html.dark {
        background-color: #0f172a;
        color: #f1f5f9;
      }

      html.dark body {
        color: #f1f5f9;
      }

      /* Custom scrollbar for academic feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      /* Print Styles (Fallback) */
      @media print {
        @page {
          margin: 10mm;
          size: auto;
        }
        body {
          background-color: white !important;
          background-image: none !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }
        header, footer, .no-print { 
          display: none !important; 
        }
        .print-content { 
          width: 100% !important;
          padding: 0 !important;
          margin: 0 !important;
          max-width: 100% !important;
          box-shadow: none !important;
          border: none !important;
        }
        .print-break-inside-avoid {
          break-inside: avoid;
        }
      }

      /* PDF Export Specific Styles (used by html2pdf) */
      .pdf-exporting {
        /* Set explicit width for A4 Landscape (approx 297mm - margins) */
        width: 1080px !important; 
        min-width: 1080px !important;
        max-width: 1080px !important;
        margin: 0 auto;
        background-color: white !important;
        background-image: none !important;
        padding: 0px !important;
        color: black !important;
      }
      
      .pdf-exporting .no-print {
        display: none !important;
      }

      /* REMOVED LINEARIZATION - KEEP GRID STRUCTURE */
      
      /* Ensure Grid works but without sticky positioning which breaks PDF capture */
      .pdf-exporting .sticky {
        position: static !important;
      }
      
      /* Fix Sidebar Height for Static Positioning */
      .pdf-exporting .lg\:col-span-4 {
         height: auto !important;
      }

      /* Visual Cleanups for PDF */
      .pdf-exporting .shadow-sm, 
      .pdf-exporting .shadow-lg, 
      .pdf-exporting .shadow-xl {
        box-shadow: none !important;
        border: 1px solid #e2e8f0 !important;
      }
      
      .pdf-exporting .bg-white {
        background-color: transparent !important;
        border: none !important; /* Optional: Keep borders or remove for cleaner look */
      }
      
      /* Improve typography for PDF reading */
      .pdf-exporting h1 {
        font-size: 24pt !important;
        margin-bottom: 16px !important;
        color: #0f172a !important;
      }
      
      .pdf-exporting h2 {
        font-size: 18pt !important;
        border-bottom: 2px solid #fbbf24 !important;
        padding-bottom: 8px !important;
        margin-bottom: 16px !important;
        color: #0f172a !important;
        margin-top: 24px !important;
      }

      .pdf-exporting p, 
      .pdf-exporting li {
        font-size: 11pt !important;
        line-height: 1.5 !important;
        color: #1e293b !important;
      }

      /* Hide Chat Widget in PDF */
      .pdf-exporting .chat-widget-root {
        display: none !important;
      }

      /* Dark Mode Component Styles */
      html.dark header {
        background-color: rgba(15, 23, 42, 0.8) !important;
        border-bottom-color: #334155 !important;
      }

      html.dark footer {
        background-color: #0f172a !important;
        border-top-color: #1e293b !important;
      }

      html.dark input,
      html.dark select,
      html.dark textarea {
        background-color: #1e293b !important;
        color: #f1f5f9 !important;
        border-color: #334155 !important;
      }

      html.dark input::placeholder,
      html.dark textarea::placeholder {
        color: #94a3b8 !important;
      }

      html.dark .bg-white {
        background-color: #1e293b !important;
        border-color: #334155 !important;
      }

      html.dark .text-slate-900,
      html.dark .text-navy-900 {
        color: #f1f5f9 !important;

      html.dark .text-slate-600,
      html.dark .text-slate-500,

      }

      html.dark .hover\:bg-slate-50:hover {
        background-color: #334155 !important;
      }

      html.dark .bg-slate-50 {
        background-color: #1e293b !important;
      }

      html.dark .border-slate-200 {
        border-color: #334155 !important;
      }
    </style>
