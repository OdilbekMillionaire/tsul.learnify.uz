    <style>
      /* Clean Light Theme Only */
      body {
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 24px 24px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

      /* ============================================
         PRINT / PDF STYLES
         Using native window.print() for crisp text
         ============================================ */
      @media print {
        @page {
          size: A4 portrait;
          margin: 15mm 12mm;
        }

        html, body {
          background: white !important;
          background-image: none !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          font-size: 11pt !important;
          line-height: 1.5 !important;
          color: #1e293b !important;
        }

        /* Hide non-print elements */
        header, footer, .no-print, .chat-widget-root {
          display: none !important;
        }

        /* Flatten grid to single column */
        .print-content {
          display: block !important;
          width: 100% !important;
          max-width: 100% !important;
          padding: 0 !important;
          margin: 0 !important;
        }

        .print-content > div {
          display: block !important;
          width: 100% !important;
          float: none !important;
        }

        /* Reset containers */
        .print-content .sticky { position: static !important; }
        .print-content [class*="shadow"] { box-shadow: none !important; }
        .print-content [class*="rounded"] { border-radius: 4px !important; }
        .print-content .animate-fade-in-up { animation: none !important; }

        /* Section cards */
        .print-content .bg-white,
        .print-content [class*="bg-slate"],
        .print-content [class*="bg-blue"] {
          background: white !important;
          border: 1px solid #cbd5e1 !important;
          box-shadow: none !important;
          margin-bottom: 12pt !important;
          padding: 16pt !important;
          page-break-inside: avoid !important;
        }

        /* Special backgrounds get light tints */
        .print-content .bg-navy-900 {
          background-color: #0f172a !important;
          color: white !important;
          border: none !important;
        }

        .print-content .bg-\[\#fffbf0\] {
          background-color: #fffbf0 !important;
          border: 1px solid #fbbf24 !important;
        }

        /* Typography */
        h1 {
          font-size: 22pt !important;
          font-weight: 900 !important;
          color: #0f172a !important;
          margin-bottom: 8pt !important;
          line-height: 1.2 !important;
        }

        h2 {
          font-size: 16pt !important;
          font-weight: 700 !important;
          color: #0f172a !important;
          margin-top: 16pt !important;
          margin-bottom: 8pt !important;
          border-bottom: 2px solid #d97706 !important;
          padding-bottom: 4pt !important;
          page-break-after: avoid !important;
        }

        h3 {
          font-size: 13pt !important;
          font-weight: 700 !important;
          page-break-after: avoid !important;
        }

        p {
          font-size: 11pt !important;
          line-height: 1.6 !important;
          margin-bottom: 8pt !important;
          orphans: 3 !important;
          widows: 3 !important;
        }

        ul, ol {
          margin: 8pt 0 8pt 16pt !important;
        }

        li {
          font-size: 11pt !important;
          line-height: 1.5 !important;
          margin-bottom: 4pt !important;
        }

        /* Source links print as text */
        .sources-print-list {
          display: block !important;
        }
        .sources-interactive {
          display: none !important;
        }

        /* Hide decorative elements */
        .print-content svg.opacity-5 { display: none !important; }
      }

      /* Source links: show interactive version on screen, print version for PDF */
      .sources-print-list { display: none; }
      .sources-interactive { display: block; }
